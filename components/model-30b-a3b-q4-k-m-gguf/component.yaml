environment:
  # The model is split into multiple shards, maintained in individual component directories.
  # However, llama-server expects the shards to be located in the same directory.
  # The layout below flattens them into a single directory via symlinks.
  # The model file path is set to the first shard's symlink:
  - SHARDS_DIR=/tmp/model-30b-a3b-q4-k-m-gguf-shards
  - MODEL_FILE=$SHARDS_DIR/nemotron-3-nano-omni-ea1_v2.0-Q4_K_M-00001-of-00006.gguf

layout:
  $SHARDS_DIR/nemotron-3-nano-omni-ea1_v2.0-Q4_K_M-00001-of-00006.gguf:
    symlink: $SNAP_COMPONENTS/model-30b-a3b-q4-k-m-gguf-1-of-6/nemotron-3-nano-omni-ea1_v2.0-Q4_K_M-00001-of-00006.gguf
  $SHARDS_DIR/nemotron-3-nano-omni-ea1_v2.0-Q4_K_M-00002-of-00006.gguf:
    symlink: $SNAP_COMPONENTS/model-30b-a3b-q4-k-m-gguf-2-of-6/nemotron-3-nano-omni-ea1_v2.0-Q4_K_M-00002-of-00006.gguf
  $SHARDS_DIR/nemotron-3-nano-omni-ea1_v2.0-Q4_K_M-00003-of-00006.gguf:
    symlink: $SNAP_COMPONENTS/model-30b-a3b-q4-k-m-gguf-3-of-6/nemotron-3-nano-omni-ea1_v2.0-Q4_K_M-00003-of-00006.gguf
  $SHARDS_DIR/nemotron-3-nano-omni-ea1_v2.0-Q4_K_M-00004-of-00006.gguf:
    symlink: $SNAP_COMPONENTS/model-30b-a3b-q4-k-m-gguf-4-of-6/nemotron-3-nano-omni-ea1_v2.0-Q4_K_M-00004-of-00006.gguf
  $SHARDS_DIR/nemotron-3-nano-omni-ea1_v2.0-Q4_K_M-00005-of-00006.gguf:
