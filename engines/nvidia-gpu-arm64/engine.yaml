name: nvidia-gpu-arm64
description: Use CUDA for inference on Nvidia GPUs
vendor: Canonical Ltd
grade: stable
devices:
  allof:
    - type: cpu
      architecture: arm64
    - type: gpu
      vendor-id: 0x10de # Nvidia Corporation
      # vram: 5238M See https://github.com/canonical/inference-snaps-cli/issues/232
memory: 15G
disk-space: 70G
components:
  - llama-cpp-cuda
  - model-30b-a3b-q8-0-gguf-1-of-8
  - model-30b-a3b-q8-0-gguf-2-of-8
  - model-30b-a3b-q8-0-gguf-3-of-8
  - model-30b-a3b-q8-0-gguf-4-of-8
  - model-30b-a3b-q8-0-gguf-5-of-8
  - model-30b-a3b-q8-0-gguf-6-of-8
  - model-30b-a3b-q8-0-gguf-7-of-8
  - model-30b-a3b-q8-0-gguf-8-of-8
  - model-mmproj-30b-a3b-f16
configurations:
  sleep-idle-seconds: 600
