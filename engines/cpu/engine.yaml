name: cpu
summary: CPU-optimized for workstations
description: |
  This engine uses llama.cpp.

  It is optimized for both amd64 and arm64 CPU architectures, for a wide range
  of architecture variants.
vendor: Canonical Ltd

devices:
  anyof:
    - type: cpu
      architecture: amd64
    - type: cpu
      architecture: arm64

runtime: llama-cpp-cpu

model:
  default: nemotron-3-nano-omni-30b-a3b
  options:
    - nemotron-3-nano-omni-30b-a3b

configurations:
  sleep-idle-seconds: 600
