name: cpu
description: Optimized for a range of CPU micro-architectures
vendor: Canonical Ltd
grade: stable
devices:
  anyof:
    - type: cpu
      architecture: amd64
    - type: cpu
      architecture: arm64

# The model will not fit into this much RAM, but it is memory mapped
memory: 15G

# The usage will be higher if considering snapd snapshots.
disk-space: 50G

components:
  - llama-cpp
  - model-30b-a3b-q4-k-m-gguf-1-of-6
  - model-30b-a3b-q4-k-m-gguf-2-of-6
  - model-30b-a3b-q4-k-m-gguf-3-of-6
  - model-30b-a3b-q4-k-m-gguf-4-of-6
  - model-30b-a3b-q4-k-m-gguf-5-of-6
  - model-30b-a3b-q4-k-m-gguf-6-of-6
  - model-mmproj-30b-a3b-f16
configurations:
  sleep-idle-seconds: 600
