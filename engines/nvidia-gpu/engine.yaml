name: nvidia-gpu
summary: CUDA optimized for workstation GPUs
description: |
  This engine uses llama.cpp with the CUDA backend.

  It is optimized for NVIDIA GPUs.

  This engine supports both amd64 and arm64 CPU architectures.
vendor: Canonical Ltd

devices:
  allof:
    - type: gpu
      vendor-id: 0x10de # Nvidia Corporation
  anyof:
    - type: cpu
      architecture: amd64
    - type: cpu
      architecture: arm64

runtime: llama-cpp-cuda

model:
  default: 30b-a3b-reasoning-q4-k-m
  options:
    - 30b-a3b-reasoning-q4-k-m

configurations:
  sleep-idle-seconds: 600
